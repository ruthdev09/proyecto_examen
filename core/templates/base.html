<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Académica{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: linear-gradient(135deg, #1a237e, #283593);
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .navbar .brand {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.5px;
        }
        .navbar .brand span { color: #90caf9; }
        .nav-links { display: flex; gap: 8px; }
        .nav-links a {
            color: #cfd8dc;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        /* ── MAIN CONTAINER ── */
        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ── PAGE HEADER ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-header h2 {
            font-size: 1.6rem;
            color: #1a237e;
            font-weight: 700;
        }
        .page-header h2 span {
            font-size: 1rem;
            color: #888;
            font-weight: 400;
            margin-left: 10px;
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-block;
            padding: 9px 20px;
            border-radius: 7px;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-primary   { background: #1565c0; color: #fff; }
        .btn-success   { background: #2e7d32; color: #fff; }
        .btn-warning   { background: #f57f17; color: #fff; }
        .btn-danger    { background: #c62828; color: #fff; }
        .btn-secondary { background: #546e7a; color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 0.8rem; }

        /* ── CARD ── */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* ── TABLE ── */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead tr {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: #fff;
        }
        thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.4px;
        }
        tbody tr {
            border-bottom: 1px solid #e8eaf6;
            transition: background 0.15s;
        }
        tbody tr:hover { background: #f5f5ff; }
        tbody td {
            padding: 12px 16px;
            font-size: 0.9rem;
            vertical-align: middle;
        }
        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
        }

        /* ── AVATAR / IMAGE ── */
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c5cae9;
        }
        .avatar-placeholder {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #e8eaf6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #9fa8da;
        }
        .course-img {
            width: 80px;
            height: 52px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .course-img-placeholder {
            width: 80px;
            height: 52px;
            background: #e8eaf6;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #9fa8da;
        }

        /* ── BADGE ── */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-blue { background: #e3f2fd; color: #1565c0; }
        .badge-green { background: #e8f5e9; color: #2e7d32; }

        /* ── FORM ── */
        .form-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px 36px;
            max-width: 600px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #c5cae9;
            border-radius: 7px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3949ab;
            background: #fff;
        }
        .form-group .helptext {
            font-size: 0.78rem;
            color: #888;
            margin-top: 4px;
        }
        .errorlist {
            color: #c62828;
            font-size: 0.82rem;
            list-style: none;
            margin-top: 4px;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            align-items: center;
        }

        /* ── MESSAGES ── */
        .messages { margin-bottom: 20px; }
        .alert {
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .alert-error   { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 0.8rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="brand" href="/">Gestión <span>Académica</span></a>
    <div class="nav-links">
        <a href="{% url 'listar_estudiantes' %}" {% if request.resolver_match.url_name == 'listar_estudiantes' %}class="active"{% endif %}>
            👨‍🎓 Estudiantes
        </a>
        <a href="{% url 'listar_cursos' %}" {% if request.resolver_match.url_name == 'listar_cursos' %}class="active"{% endif %}>
            📚 Cursos
        </a>
        <a href="/admin/" target="_blank">⚙️ Admin</a>
    </div>
</nav>

<div class="container">
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

<footer>
    Sistema de Gestión Académica &mdash; Django + MySQL &copy; 2026
</footer>

</body>
</html>
